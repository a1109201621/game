<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💬 私密聊天</title>
    <link rel="stylesheet" href="style.css">
    <script src="game.js"></script>
</head>

<body x-data="">
    <!-- 加载中 -->
    <div x-show="$store.chat.loading" class="loading-screen" style="display: none;">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p>加载中...</p>
            <button class="skip-btn" @click="$store.chat.skipLoading()">
                ⏭️ 跳过等待
            </button>
        </div>
    </div>

    <!-- 设置界面 -->
    <div x-show="!$store.chat.started &amp;&amp; !$store.chat.loading" x-transition="" class="setup-screen">
        <div class="setup-header">
            <h1>💕 私密聊天</h1>
            <p>设置你的聊天对象</p>
        </div>

        <div class="setup-form">
            <!-- 模型选择 -->
            <div class="form-section">
                <label>🤖 AI模型</label>
                <select x-model="$store.chat.model">
                    <template x-for="m in $store.chat.modelList" :key="m.value">
                        <option :value="m.value" x-text="m.label"></option>
                    </template>
                </select>
            </div>

            <!-- 角色预设选择（二级菜单） -->
            <div class="form-section">
                <label>👤 选择角色预设</label>
                <select x-model="$store.chat.selectedPreset" @change="$store.chat.applyPreset()">
                    <template x-for="(preset, index) in $store.chat.getCurrentPresetList()" :key="index">
                        <option :value="index" x-text="preset.label"></option>
                    </template>
                </select>
            </div>

            <!-- ✨ AI自定义角色生成区域 -->
            <div class="form-section ai-generate-section" x-show="$store.chat.isCustomPreset()" x-transition=""
                style="display: none;">
                <label>✨ AI角色生成器</label>
                <div class="ai-generate-box">
                    <textarea x-model="$store.chat.customRequirement" rows="3" placeholder="描述你想要的角色，例如：
• 一个喜欢cosplay的元气少女
• 冷酷但内心温柔的女上司
• 会撒娇的邻家小妹妹" :disabled="$store.chat.generating"></textarea>
                    <button class="generate-btn" @click="$store.chat.generateCustomCharacter()"
                        :disabled="!$store.chat.customRequirement.trim() || $store.chat.generating" disabled="disabled">
                        <span x-show="!$store.chat.generating">🎲 AI生成角色(约0.3分/次)</span>
                        <span x-show="$store.chat.generating" class="generating-text" style="display: none;">
                            <span class="dot-loading"></span> 生成中...
                        </span>
                    </button>
                </div>
                <p class="ai-hint" x-show="!$store.chat.generating">💡 输入你的要求，AI会自动生成完整的角色设定</p>
            </div>

            <!-- 基本信息 -->
            <div class="form-section">
                <label>姓名</label>
                <input x-model="$store.chat.charName" placeholder="输入姓名">
            </div>

            <!-- 性格特点 -->
            <div class="form-section">
                <label>🎭 性格特点</label>
                <textarea x-model="$store.chat.charPersonality" rows="5" placeholder="描述角色的性格..."></textarea>
            </div>

            <!-- 聊天风格 -->
            <div class="form-section">
                <label>💬 聊天风格</label>
                <textarea x-model="$store.chat.charStyle" rows="5" placeholder="描述角色的说话方式..."></textarea>
            </div>

            <!-- 你的名字 -->
            <div class="form-section">
                <label>👤 你的称呼</label>
                <input x-model="$store.chat.userName" placeholder="帅哥/老公/大哥...">
            </div>

            <button class="start-btn" @click="$store.chat.start()">
                💬 开始聊天
            </button>

            <button class="reset-preset" @click="$store.chat.resetToCurrentPreset()">
                🔄 重置当前预设
            </button>

            <!-- ✨ 新增：清除存档按钮 -->
            <button class="clear-save-btn" @click="$store.chat.clearAllData()">
                🗑️ 清除所有数据
            </button>
        </div>
    </div>

    <!-- 聊天界面 -->
    <div x-show="$store.chat.started &amp;&amp; !$store.chat.loading" x-transition="" class="chat-screen"
        style="display: none;">
        <!-- 顶部栏 -->
        <div class="chat-header">
            <button class="back-btn" @click="$store.chat.backToSetup()">
                ←
            </button>
            <div class="chat-title">
                <div class="avatar-small">
                    <img src="https://img.wutongsama.xyz/i/2025/12/04/umcr63.png" alt="头像">
                    <span class="online-dot"></span>
                </div>
                <div class="title-info">
                    <span class="name" x-text="$store.chat.charName">林晓雪</span>
                    <div class="affection-bar-mini">
                        <div class="affection-fill" :style="`width: ${$store.chat.affection}%`" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <div class="money-display">
                    <span class="money-icon">💰</span>
                    <span class="money-value" x-text="'$' + $store.chat.money">$10000</span>
                </div>
                <button class="model-toggle" @click="$store.chat.showModelSelect = !$store.chat.showModelSelect">
                    ⚙️
                </button>
            </div>
        </div>

        <!-- 工作时间指示条 -->
        <div x-show="$store.chat.isWorkTime" class="work-time-bar" x-transition style="display: none;">
            <span>🏢 工作中 · 暂不回复</span>
        </div>

        <!-- 模型选择下拉 -->
        <div x-show="$store.chat.showModelSelect" class="model-dropdown"
            @click.outside="$store.chat.showModelSelect = false" style="display: none;">
            <select x-model="$store.chat.model" @change="$store.chat.showModelSelect = false">
                <template x-for="m in $store.chat.modelList" :key="m.value">
                    <option :value="m.value" x-text="m.label"></option>
                </template>
            </select>
            <button class="add-money-btn" @click="$store.chat.addMoney(10000)" style="width:100%; margin-top:8px;">
                💰 充值 10000
            </button>
        </div>

        <!-- 消息区域 -->
        <div class="messages-area" x-ref="messagesArea">
            <template x-for="(msg, index) in $store.chat.messages" :key="index">
                <div :class="'message ' + msg.role">
                    <template x-if="msg.role === 'assistant'">
                        <div class="avatar-mini">
                            <img src="https://img.wutongsama.xyz/i/2025/12/04/umcr63.png" alt="">
                        </div>
                    </template>
                    <div class="bubble-wrapper">
                        <div class="bubble" x-html="$store.chat.formatMessage(msg.content)"></div>
                        <div class="time" x-text="msg.time || ''"></div>
                    </div>
                </div>
            </template>

            <div x-show="$store.chat.typing" class="message assistant" style="display: none;">
                <div class="avatar-mini">
                    <img src="https://img.wutongsama.xyz/i/2025/12/04/umcr63.png" alt="">
                </div>
                <div class="bubble-wrapper">
                    <div class="bubble typing">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <div class="input-wrapper">
                <input x-model="$store.chat.input" @keydown.enter="$store.chat.send()" :disabled="$store.chat.sending"
                    placeholder="输入消息...">
                <button class="send-btn" @click="$store.chat.send()"
                    :disabled="$store.chat.sending || !$store.chat.input.trim()" disabled="disabled">
                    发送
                </button>
            </div>
            <div class="quick-actions">
                <button @click="$store.chat.showRedPacketDialog()">🧧 红包</button>
                <button @click="$store.chat.showGiftDialog()">🎁 礼物</button>
            </div>
        </div>

        <!-- 红包弹窗 -->
        <div x-show="$store.chat.showRedPacket" class="modal-overlay" @click.self="$store.chat.showRedPacket = false"
            style="display: none;">
            <div class="modal-content">
                <h3>💰 发红包</h3>
                <div class="modal-input-group">
                    <label>金额</label>
                    <input type="number" x-model="$store.chat.redPacketAmount" min="1" placeholder="输入金额">
                </div>
                <div class="modal-input-group">
                    <label>留言 (选填)</label>
                    <input type="text" x-model="$store.chat.redPacketMessage" placeholder="想对ta说的话...">
                </div>
                <div class="modal-actions">
                    <button @click="$store.chat.showRedPacket = false" class="btn-cancel">取消</button>
                    <button @click="$store.chat.sendRedPacket()" class="btn-confirm">发送</button>
                </div>
            </div>
        </div>

        <!-- 礼物弹窗 -->
        <div x-show="$store.chat.showGift" class="modal-overlay" @click.self="$store.chat.showGift = false"
            style="display: none;">
            <div class="modal-content">
                <h3>🎁 送礼物</h3>
                <div class="modal-input-group">
                    <label>礼物名称</label>
                    <input type="text" x-model="$store.chat.giftName" placeholder="例如：口红、手表">
                </div>
                <div class="modal-input-group">
                    <label>价值</label>
                    <input type="number" x-model="$store.chat.giftPrice" min="1" placeholder="输入价值">
                </div>
                <div class="modal-input-group">
                    <label>留言 (选填)</label>
                    <input type="text" x-model="$store.chat.giftMessage" placeholder="想对ta说的话...">
                </div>
                <div class="modal-actions">
                    <button @click="$store.chat.showGift = false" class="btn-cancel">取消</button>
                    <button @click="$store.chat.sendGift()" class="btn-confirm">送出</button>
                </div>
            </div>
        </div>

        <!-- Debug 悬浮按钮 (已注释) 
        <button class="debug-fab" @click="$store.chat.toggleDebugPanel()">
            🐛
        </button>
        -->

        <!-- Debug 面板 -->
        <div x-show="$store.chat.showDebugPanel" class="debug-panel" x-transition style="display: none;">
            <div class="debug-panel-header">
                <span>🐛 Debug 控制台</span>
                <button class="debug-close" @click="$store.chat.showDebugPanel = false">×</button>
            </div>
            <div class="debug-panel-body">
                <div class="debug-row">
                    <span class="debug-label">当前时间</span>
                    <span class="debug-value" x-text="$store.chat.debugTimeDisplay"></span>
                </div>
                <div class="debug-row">
                    <span class="debug-label">状态</span>
                    <span class="debug-value" :class="$store.chat.isWorkTime ? 'status-work' : 'status-free'"
                        x-text="$store.chat.isWorkTime ? '🏢 工作时间' : '✅ 空闲时间'"></span>
                </div>
                <div class="debug-row" x-show="$store.chat.debugMode">
                    <span class="debug-label">模式</span>
                    <span class="debug-value status-debug">🛠️ 调试时间生效中</span>
                </div>
                <div class="debug-input-row">
                    <input type="time" x-ref="debugTimeInput" class="debug-time-input" value="10:00">
                    <button class="debug-btn"
                        @click="$store.chat.setDebugTime($refs.debugTimeInput.value)">设置时间</button>
                </div>
                <button class="debug-btn debug-btn-secondary" @click="$store.chat.clearDebugTime()">⏮️ 恢复真实时间</button>
                <button class="debug-btn debug-btn-accent" @click="$store.chat.simulateReopen()">🔄 模拟重新打开</button>
            </div>
        </div>
    </div>

    <script defer="" src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

</body>

</html>
